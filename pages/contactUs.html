<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="header-container">
            <a href="../index.html" class="logo">Home of Recipes</a>
            <nav>
                <ul>
                    <li><a href="./about.html">About</a></li>
                    <li><a href="./recipes.html">Recipes</a></li>
                    <li><a href="./contactUs.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-container">
                <div class="hero-text">
                    <h1>Get in touch</h1>
                    <p>Have a recipe you would like to share? Want to suggest
                        a dish? Or just want to say hello? We would love to
                        hear from you.</p>
                </div>
            </div>
        </section>

        <section class="info-section">
            <div class="info-container">

                <h2>Send us a message</h2>

                <form class="contact-form">

                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="Recipe suggestion, feedback...">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6"
                            placeholder="Write your message here..."></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>

                </form>
            </div>
        </section>

        <footer>
            <div class="footer-container">
                <p>Copyright &copy; 2026 Home of Recipes</p>
            </div>
        </footer>


    </main>
</body>

</html>
